name: restaurant_pos
description: Complete Restaurant Management System
version: 2.0.0+1
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7
  get_it: ^7.7.0
  drift: ^2.19.1
  sqlite3_flutter_libs: ^0.5.23
  path_provider: ^2.1.3
  path: ^1.9.0
  crypto: ^3.0.3
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  pdf: ^3.11.1
  printing: ^5.13.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  uuid: ^4.4.2
  intl: ^0.19.0
  collection: ^1.18.0
  equatable: ^2.0.5
  logger: ^2.4.0
  archive: ^3.6.1
  open_filex: ^4.5.1
  shimmer: ^3.0.0
  window_manager: ^0.3.9
  pointycastle: ^3.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.19.1
